<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Classroom Record System | Sign In</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="css/shared/auth.css?v=2">
</head>

<body>

<main class="auth-shell">
    <section class="auth-card">
        <div class="auth-logo">CR</div>
        <h1 id="title">Classroom Record System</h1>
        <p id="subtitle">Sign in to manage attendance, classrooms, members, reports, and QR records.</p>

        <form id="authForm">
            <input id="name" placeholder="Full name" style="display:none;">
            <input id="email" type="email" placeholder="Email address">
            <input id="password" type="password" placeholder="Password">
            <button id="btn" type="submit">Sign In</button>
        </form>

        <div class="switch" id="toggle">Create a student account</div>
    </section>
</main>

<script src="js/shared/config.js?v=2"></script>
<script src="js/auth/login.js?v=1"></script>

</body>
</html>
