<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Classroom Record System | Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="css/shared/base.css?v=4">
<link rel="stylesheet" href="css/shared/components.css?v=4">
</head>

<body>

<header class="app-header">
    <h1>Classroom Portal</h1>
    <nav class="nav"></nav>

    <button class="logout" onclick="logout()">Sign Out</button>
</header>

<div class="main">
    <div id="dashboard" class="section active">
        <h2>Dashboard</h2>
        <div id="dashboardStats" class="dashboard-stats"></div>
        <div class="dashboard-panel">
            <div class="panel-header">
                <h3>Student QR Codes</h3>
            </div>
            <div id="dashboardQrGrid" class="dashboard-qr-grid"></div>
        </div>
        <div class="dashboard-panel">
            <div class="panel-header">
                <h3>Recent Attendance</h3>
            </div>
            <table id="dashboardActivityTable"></table>
        </div>
    </div>

    <div id="users" class="section">
        <h2>User Management</h2>
        <div class="section-actions">
            <button class="primary" onclick="addUser()">+ Add User</button>
            <button class="primary" onclick="loadUsers()">Refresh Users</button>
        </div>
        <table id="usersTable"></table>
    </div>

    <div id="classrooms" class="section">
        <h2>Classroom Management</h2>
        <div class="section-actions">
            <button id="addClassroomButton" class="primary" onclick="addClassroom()">+ Add Classroom</button>
        </div>
        <table id="classroomsTable"></table>
    </div>

    <div id="reports" class="section">
        <h2>Reports</h2>
        <div id="reportActions" class="section-actions">
            <button class="primary" onclick="downloadExcel()">Export Excel</button>
            <button class="primary" onclick="downloadPdf()">Export PDF</button>
            <button class="primary" onclick="downloadCsv()">Export CSV</button>
        </div>
        <table id="reportsTable"></table>
    </div>

    <div id="qr" class="section">
        <h2>QR Codes</h2>
        <div class="section-actions">
            <button class="primary" onclick="printQrCodes()">Print QR Codes</button>
        </div>
        <table id="qrTable"></table>
    </div>
</div>

<script src="js/shared/config.js?v=1"></script>
<script src="js/shared/auth.js?v=3"></script>
<script src="js/sections/users.js?v=2"></script>
<script src="js/sections/classrooms.js?v=4"></script>
<script src="js/sections/reports.js?v=7"></script>
<script src="js/sections/qr.js?v=3"></script>
<script src="js/app.js?v=2"></script>

</body>
</html>
